services:
  - type: web
    name: pm25-dashboard-odpc7
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true          # Render สร้าง random secret ให้อัตโนมัติ
      - key: GISTDA_KEY
        sync: false                  # กรอกใน Render dashboard
      - key: SHEET_ID
        sync: false                  # กรอกใน Render dashboard
      - key: ADMIN_USERNAME
        sync: false                  # กรอกใน Render dashboard (ถ้าต้องการเปลี่ยน)
      - key: ADMIN_PASSWORD_HASH
        sync: false                  # bcrypt hash ของ password ใหม่
